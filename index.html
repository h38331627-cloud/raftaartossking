<style>
body{
background:#000;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
font-family:sans-serif;
}

/* iPhone Frame */
.phone{
width:320px;
height:640px;
background:#0f172a;
border-radius:40px;
border:6px solid #111;
box-shadow:0 0 40px rgba(0,0,0,0.9);
overflow:hidden;
position:relative;
}

/* Notch */
.notch{
width:150px;
height:25px;
background:#000;
position:absolute;
top:0;
left:50%;
transform:translateX(-50%);
border-bottom-left-radius:20px;
border-bottom-right-radius:20px;
z-index:10;
}

/* Screen */
.screen{
padding:20px;
height:100%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
color:white;
}

/* IMAGE CIRCLE */
.image-box{
position:relative;
width:120px;
height:120px;
border-radius:50%;
overflow:hidden;
margin-bottom:15px;
animation:zoom 2s infinite;
box-shadow:0 0 20px #00f2ff, 0 0 40px #007bff;
}

/* IMAGE */
.image-box img{
width:100%;
height:100%;
object-fit:cover;
}

/* WAVE EFFECT */
.image-box::before,
.image-box::after{
content:'';
position:absolute;
border-radius:50%;
border:2px solid #00f2ff;
width:120px;
height:120px;
top:0;
left:0;
animation:wave 2.5s infinite;
}

.image-box::after{
animation-delay:1.2s;
}

/* ANIMATIONS */
@keyframes wave{
0%{transform:scale(1);opacity:0.7;}
100%{transform:scale(1.8);opacity:0;}
}

@keyframes zoom{
0%{transform:scale(1);}
50%{transform:scale(1.1);}
100%{transform:scale(1);}
}

/* BUTTON */
@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.06)}
100%{transform:scale(1)}
}

.btn{
animation:pulse 1.6s infinite;
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
}

/* BLINK */
@keyframes blink{
0%,100%{opacity:1}
50%{opacity:0.3}
}

.blink{
animation:blink 1s infinite;
}
</style>

</head>
